<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>提瓦特生日倒计时</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 100vw;
        height: 100vh;
        background: url("https://upload-bbs.miyoushe.com/upload/2025/07/22/191335050/6b6c25efd55c8843124838d73a177fcb_1227108214769242565.png")
          no-repeat center center;
        background-size: cover;
        padding: 20px;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .main-container {
        width: 100%;
        max-width: 600px;
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      header {
        width: 100%;
        max-width: 600px;
        min-height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        margin-bottom: 20px;
        color: #ffffff;
        font-size: 26px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        backdrop-filter: blur(20px);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.15);
        transition: box-shadow 0.3s ease;
      }
      header a {
        position: absolute;
        right: 20px;
        font-size: 16px;
        font-weight: 400;
        color: #fff;
        text-decoration: none;
      }
      .glass-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 15px;
        width: 100%;
        flex: 1;
      }
      .glass-item {
        position: relative;
        background: transparent;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 25px;
        font-weight: 500;
        text-decoration: none;
        overflow: hidden;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
      }
      .glass-item::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-size: cover;
        background-position: center;
        z-index: -1;
        filter: blur(2px);
        opacity: 0.6;
      }
      /* 蒙德 */
      .glass-item:nth-child(1)::before {
        background-image: url("https://i0.hdslb.com/bfs/new_dyn/1d07f2f82c87a4a0e27983747b9535491453112887.jpg@1192w.avif");
      }
      /* 璃月 */
      .glass-item:nth-child(2)::before {
        background-image: url("https://i0.hdslb.com/bfs/new_dyn/fb3c2fd0cc4b5bbd98b31f8fd24fea771453112887.webp@964w_514h.avif");
      }
      /* 稻妻 */
      .glass-item:nth-child(3)::before {
        background-image: url("https://i0.hdslb.com/bfs/new_dyn/40b673cd561f849e8dc61666fbad65101453112887.webp@948w_534h.avif");
      }
      /* 须弥 */
      .glass-item:nth-child(4)::before {
        background-image: url("https://i0.hdslb.com/bfs/new_dyn/deafc167b63794951ef581c0018677761453112887.webp@964w_536h.avif");
      }
      /* 枫丹 */
      .glass-item:nth-child(5)::before {
        background-image: url("https://i0.hdslb.com/bfs/new_dyn/0ec2242a0df8944b0c9e86fe546573ca1453112887.jpg@868w_488h.avif");
      }
      /* 纳塔 */
      .glass-item:nth-child(6)::before {
        background-image: url("https://i0.hdslb.com/bfs/new_dyn/8fd7a1a81361da18db3c5984393691261453112887.webp@948w_592h.avif");
      }
      /* 挪德卡莱 */
      .glass-item:nth-child(7)::before {
        background-image: url("https://i0.hdslb.com/bfs/new_dyn/eb03411b5fe96d2d8c67aa5c963edc051453112887.jpg@868w_488h.avif");
      }
      /* 至冬 */
      .glass-item:nth-child(8)::before {
        background-image: url("https://i0.hdslb.com/bfs/new_dyn/5430e324dae1f3d72b2a9d80bc91a7191453112887.jpg@1192w.avif");
      }
      .glass-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        border-color: rgba(255, 255, 255, 0.5);
        transition: all 0.3s ease;
      }
      .glass-item:hover::before {
        opacity: 0.8;
        filter: blur(1px);
        transition: all 0.3s ease;
      }
      footer {
        width: 100%;
        max-width: 600px;
        min-height: 35px;
        display: flex;
        padding: 0 20px;
        margin-top: 20px;
        align-items: center;
        justify-content: center;
        position: relative;
        margin-bottom: 20px;
        color: #ffffff;
        font-size: 15px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        backdrop-filter: blur(20px);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.15);
        transition: box-shadow 0.3s ease;
      }
      footer .icon-group a {
        color: #fff;
        margin-left: 15px;
        text-decoration: none;
        font-size: 16px;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="main-container">
      <header>
        <b>提瓦特生日倒计时</b>
        <a
          href="https://wiki.biligame.com/ys/%E7%94%9F%E6%97%A5%E6%97%A5%E5%8E%86#%E6%8F%90%E7%93%A6%E7%89%B9%E5%85%A8%E8%A7%92%E8%89%B2%E7%94%9F%E6%97%A5%E6%97%A5%E5%8E%86"
          ><u>生日日历</u></a
        >
      </header>
      <div class="glass-container">
        <a href="#" class="glass-item">蒙德🕍</a>
        <a href="#" class="glass-item">璃月🪙</a>
        <a href="#" class="glass-item">稻妻🌸</a>
        <a href="#" class="glass-item">须弥🌿</a>
        <a href="#" class="glass-item">枫丹💧</a>
        <a href="#" class="glass-item">纳塔🔥</a>
        <a href="#" class="glass-item">挪德卡莱🌙</a>
        <a href="#" class="glass-item">至冬❄️</a>
      </div>
    </div>
    <footer>
      <div>© 2026 原神相关内容 | 本页面仅作娱乐用途</div>

        <a href="https://github.com/chixxxna" target="_blank"
          ><i class="fa-brands fa-github"></i
        ></a>
        <a href="mailto:3401795043@qq.com"
          ><i class="fa-solid fa-envelope"></i
        ></a>
      </div>
    </footer>
  </body>
</html>
